version: '3.8'

services:
  storageops-api:
    build: .
    container_name: storageops-api
    ports:
      - "8080:8080"
    volumes:
      - ./database:/app/database
    environment:
      - FLASK_APP=api.app
      - FLASK_DEBUG=0
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
    restart: unless-stopped